services:
  bbq_postgres:
    image: postgres:latest
    container_name: bbq
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: bbq_db
    ports:
      - "5437:5432"
    deploy:
      resources:
        limits:
          cpus: 0.50
          memory: 512M
        reservations:
          cpus: 0.25
          memory: 256M
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d bbq_db" ]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped